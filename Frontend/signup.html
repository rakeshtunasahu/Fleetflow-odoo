<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - FleetFlow</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="min-h-screen flex items-center justify-center bg-[#0f1f3d]">

<div class="w-[1000px] flex rounded-3xl overflow-hidden shadow-2xl">

  <!-- LEFT SIDE -->
  <div class="w-1/2 bg-[#0f1f3d] text-white p-14">

    <h2 class="text-5xl font-semibold mb-12">Registration</h2>

    <form onsubmit="register(event)" class="space-y-10">

      <div>
        <label class="text-gray-400">Username</label>
        <input type="text" id="username"
          class="w-full bg-transparent border-b border-blue-400 py-2 focus:outline-none focus:border-blue-300">
      </div>

      <div>
        <label class="text-gray-400">Email</label>
        <input type="email" id="email"
          class="w-full bg-transparent border-b border-blue-400 py-2 focus:outline-none focus:border-blue-300">
      </div>

      <div>
        <label class="text-gray-400">Password</label>
        <input type="password" id="password"
          class="w-full bg-transparent border-b border-blue-400 py-2 focus:outline-none focus:border-blue-300">
      </div>

      <button
        class="w-full mt-6 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl transition shadow-lg">
        Registration
      </button>

    </form>

    <p class="mt-6 text-gray-400">
      Already have an account?
      <a href="login.html" class="text-blue-400 hover:underline">Login</a>
    </p>

  </div>

  <!-- RIGHT SIDE -->
  <div class="w-1/2 bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white text-center p-10">
    <h2 class="text-4xl font-bold leading-snug">
      Create your FleetFlow Account
    </h2>
  </div>

</div>

<script>
function register(e){
  e.preventDefault();

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // 👇 YAHI LINE ADD KARNA THA
  let users = JSON.parse(localStorage.getItem("fleetUsers")) || [];

  // Check if email already exists
  const userExists = users.find(user => user.email === email);

  if(userExists){
      alert("Account already exists with this email. Please login.");
      return;
  }

  // Add new user
  users.push({
      username,
      email,
      password
  });

  localStorage.setItem("fleetUsers", JSON.stringify(users));

  alert("Account Created Successfully!");
  window.location.href = "login.html";
}
</script>

</body>
</html>
